name: Build

on:
  push:
    branches:
      - master
      - "claude/**"
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleFreeDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: lemuroid-debug-${{ github.sha }}
          path: lemuroid-app/build/outputs/apk/free/debug/lemuroid-app-free-debug.apk
          retention-days: 14
